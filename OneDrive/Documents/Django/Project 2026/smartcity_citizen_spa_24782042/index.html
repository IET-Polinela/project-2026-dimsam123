<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCity Citizen Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .sidebar {
            background-color: #ffffff;
            border-right: 1px solid #dee2e6;
            min-height: 100vh;
        }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar p-3 collapse collapse-horizontal" id="sidebarMenu">
                <h4 class="mb-4 text-primary">Citizen Portal</h4>
                <hr>
                
                <button type="button" class="btn btn-primary w-100 mb-4" data-bs-toggle="modal" data-bs-target="#reportModal" id="btnTambahLaporan" onclick="window.resetReportForm()">
                    + Tambah Laporan
                </button>

                <ul class="nav flex-column nav-pills mb-4">
                    <li class="nav-item">
                        <button class="nav-link active w-100 text-start" id="navFeed" onclick="window.loadDashboardData('feed', 1)">Feed Warga</button>
                    </li>
                    <li class="nav-item mt-1">
                        <button class="nav-link w-100 text-start" id="navLaporanku" onclick="window.loadDashboardData('my_reports', 1)">Laporanku</button>
                    </li>
                </ul>

                <hr>
                <h5>Rekap Laporanku</h5>
                <ul class="list-group list-group-flush shadow-sm rounded">
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        Draft
                        <span class="badge bg-warning rounded-pill" id="statsDraft">0</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        Diproses
                        <span class="badge bg-primary rounded-pill" id="statsDiproses">0</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        Selesai
                        <span class="badge bg-success rounded-pill" id="statsSelesai">0</span>
                    </li>
                </ul>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Daftar Laporan Masyarakat</h1>
                </div>

                <div id="reportContainer" class="mb-4">
                    <p class="text-muted text-center">Sedang memuat data...</p>
                </div>

                <div id="paginationContainer"></div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="reportModalLabel">Form Pengajuan Laporan</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formLaporan">
                        <input type="hidden" id="reportId">
                        
                        <div class="mb-3">
                            <label for="reportTitle" class="form-label">Judul Masalah</label>
                            <input type="text" class="form-control" id="reportTitle" placeholder="Contoh: Lampu Jalan Mati" required>
                        </div>
                        <div class="mb-3">
                            <label for="reportContent" class="form-label">Deskripsi Lengkap Kejadian</label>
                            <textarea class="form-control" id="reportContent" rows="4" placeholder="Tulis rincian lokasi dan detail kendala di sini..." required></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary text-dark bg-light border" data-bs-dismiss="modal">Batal</button>
                    <button type="button" class="btn btn-success" id="btnAjukan" onclick="window.submitReportForm('REPORTED')">Ajukan Sekarang</button>
                    <button type="button" class="btn btn-success" id="btnAjukan" onclick="window.submitReportForm('DRAFT')">Simpan Draft</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Endpoint utama API Django port 8000
        const API_BASE = 'http://103.151.63.85:8010/api/reports/';
        let currentTab = 'feed';

        // Fungsi membersihkan form modal
        window.resetReportForm = function() {
            document.getElementById('formLaporan').reset();
            document.getElementById('reportId').value = '';
            document.getElementById('reportModalLabel').innerText = "Form Pengajuan Laporan";
        };

        function getAuthHeaders() {
            const token = localStorage.getItem('access_token');
            return {
                'Content-Type': 'application/json',
                'Accept': 'application/json',
                'Authorization': token ? `Bearer ${token}` : ''
            };
        }

        async function loadSummaryStats() {

            try {

                const response = await fetch(
                    `${API_BASE}?tab=my_reports&page_size=1000`,
                    {
                        headers: getAuthHeaders()
                    }
                );

                const data = await response.json();
                renderPagination(data);

                const reports = data.results || [];

                document.getElementById("statsDraft").innerText =
                    reports.filter(
                        r => r.status === "DRAFT"
                    ).length;

                document.getElementById("statsDiproses").innerText =
                    reports.filter(
                        r =>
                        r.status === "REPORTED" ||
                        r.status === "VERIFIED" ||
                        r.status === "IN_PROGRESS"
                    ).length;

                document.getElementById("statsSelesai").innerText =
                    reports.filter(
                        r => r.status === "RESOLVED"
                    ).length;

            } catch(err) {
                console.error(err);
            }
        }

        function renderPagination(data) {

            const pagination =
                document.getElementById(
                    "paginationContainer"
                );

            pagination.innerHTML = "";

            let html = "";

            if(data.previous) {

                html += `
                    <button
                        class="btn btn-outline-primary me-2"
                        onclick="loadDashboardData(
                            '${currentTab}',
                            ${data.current_page - 1}
                        )">
                        Prev
                    </button>
                `;
            }

            html += `
                <span class="fw-bold me-2">
                    Halaman ${data.current_page}
                </span>
            `;

            if(data.next) {

                html += `
                    <button
                        class="btn btn-outline-primary"
                        onclick="loadDashboardData(
                            '${currentTab}',
                            ${data.current_page + 1}
                        )">
                        Next
                    </button>
                `;
            }

            pagination.innerHTML = html;
        }

        window.loadDashboardData = async function(tab = 'feed', page = 1) {
            currentTab = tab;
            console.log("Memuat data untuk tab:", tab);
            
            // Atur gaya aktif tombol menu navigasi sidebar
            if (tab === 'feed') {
                document.getElementById('navFeed')?.classList.add('active');
                document.getElementById('navLaporanku')?.classList.remove('active');
            } else {
                document.getElementById('navFeed')?.classList.remove('active');
                document.getElementById('navLaporanku')?.classList.add('active');
            }

            const container = document.getElementById('reportContainer');
            if (!container) return;
            
            container.innerHTML = '<p class="text-center text-muted">Sedang memuat data...</p>';

            try {
                const response = await fetch(`${API_BASE}?tab=${tab}&page=${page}`, {
                    method: 'GET',
                    headers: getAuthHeaders() // Gunakan fungsi terpusat
                });

                if (!response.ok) throw new Error(`Respon server status: ${response.status}`);
                const data = await response.json();
                
                container.innerHTML = '';
                let reports = data.results || data; 
                
                if (!reports || reports.length === 0) {
                    container.innerHTML = '<p class="text-muted text-center">Tidak ada laporan saat ini.</p>';
                    return;
                }

                // ================= KUNCI RAHASIA PEMISAHAN TAB =================
                if (tab === 'feed') {
                    // Feed Warga HANYA menampilkan laporan yang BUKAN DRAFT
                    reports = reports.filter(report => report.status !== 'DRAFT');
                } 
                else if (tab === 'my_reports') {
                    // Laporanku HANYA menampilkan laporan milik kita yang MASIH DRAFT
                    reports = reports.filter(report => report.is_owner === true && report.status === 'DRAFT');
                }
                // ===============================================================

                if (reports.length === 0) {
                    container.innerHTML = tab === 'feed' 
                        ? '<p class="text-muted text-center">Belum ada laporan warga yang diajukan.</p>'
                        : '<p class="text-muted text-center">Kamu tidak memiliki laporan di draf.</p>';
                    return;
                }

                let htmlContent = '';
                reports.forEach(report => {
                    const judulLaporan = report.title || report.judul || 'Tanpa Judul';
                    const isiLaporan = report.description || report.description || report.isi || '';
                    const statusLaporan = report.status || 'DRAFT';
                    let progress = 20;

                    switch(statusLaporan){

                        case "DRAFT":
                            progress = 20;
                            break;

                        case "REPORTED":
                            progress = 40;
                            break;

                        case "VERIFIED":
                            progress = 60;
                            break;

                        case "IN_PROGRESS":
                            progress = 80;
                            break;

                        case "RESOLVED":
                            progress = 100;
                            break;
                    }

                    let badgeColor = 'bg-warning text-dark';
                    if (statusLaporan === 'REPORTED' || statusLaporan === 'IN_PROGRESS' || statusLaporan === 'DIAJUKAN') badgeColor = 'bg-primary';
                    if (statusLaporan === 'SELESAI' || statusLaporan === 'RESOLVED') badgeColor = 'bg-success';

                    htmlContent += `
                        <div class="card mb-3 shadow-sm border-start border-3 border-primary">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <h5 class="card-title mb-0 text-primary">${judulLaporan}</h5>
                                    <span class="badge ${badgeColor}">${statusLaporan}</span>
                                </div>
                                <p class="card-text">
                                    ${isiLaporan}
                                </p>

                                <div class="progress mb-3">

                                    <div
                                        class="progress-bar"
                                        role="progressbar"
                                        style="width:${progress}%">

                                        ${progress}%

                                    </div>

                                </div>
                                <div class="d-flex justify-content-end gap-2">
                                    <button class="btn btn-sm btn-outline-warning" onclick="window.editReport(${report.id})">Edit</button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="window.deleteReport(${report.id})">Hapus</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = htmlContent;
                loadSummaryStats();

            } catch (error) {
                console.error("Gagal memuat:", error);
                container.innerHTML = `<p class="text-danger text-center">Gagal menampilkan data dari API Django.</p>`;
            }
        };
        // Menyimpan data laporan Baru (POST) atau Perubahan data (PUT)
        window.submitReportForm = async function(targetStatus) {
            const id = document.getElementById('reportId').value;
            const title = document.getElementById('reportTitle').value.trim();
            const content = document.getElementById('reportContent').value.trim();

            if (!title || !content) {
                alert("Mohon isi judul dan deskripsi laporan terlebih dahulu!");
                return;
            }

            // Struktur JSON disesuaikan mutlak dengan field database Django (title & description)
            // Struktur JSON disesuaikan mutlak dengan validasi Serializer Django kamu
            const payload = { 
                title: title, 
                description: content, 
                status: targetStatus,
                category: "Fasilitas Publik", // Nilai default agar tidak memicu bad request 400
                location: "Kota SmartCity"     // Nilai default agar lolos validasi database
            };
            
            // Jika ID ada, mode bertukar jadi PUT (Edit data), jika kosong mode POST (Buat baru)
            const url = id ? `${API_BASE}${id}/` : API_BASE;
            const method = id ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: getAuthHeaders(),
                    body: JSON.stringify(payload)
                });

                if (response.ok || response.status === 201) {
                    alert(id ? "Perubahan laporan berhasil disimpan!" : "Laporan sukses ditambahkan!");
                    
                    window.resetReportForm();

                    // Tutup modal popup
                    const modalEl = document.getElementById('reportModal');
                    if (modalEl) {
                        const modalInstance = bootstrap.Modal.getInstance(modalEl);
                        if (modalInstance) modalInstance.hide();
                    }
                    
                    // Segarkan kembali isi dashboard
                    window.loadDashboardData(currentTab, 1);
                } else {
                    alert("Gagal memproses data di backend. Status code: " + response.status);
                }
            } catch (error) {
                console.error("Error submitForm:", error);
                alert("Koneksi gagal ke server Django port 8000.");
            }
        };

        // Mengambil data spesifik ke form modal saat tombol Edit diklik
        window.editReport = async function(id) {
            window.resetReportForm();
            document.getElementById('reportModalLabel').innerText = "Edit Laporan Anda";
            
            try {
                const response = await fetch(`${API_BASE}${id}/`, {
                                            method:'GET',
                                            headers:getAuthHeaders()
                                        });
                if (!response.ok) throw new Error("Gagal mengambil rincian data");
                const report = await response.json();
                
                document.getElementById('reportId').value = report.id;
                document.getElementById('reportTitle').value = report.title || report.judul || '';
                document.getElementById('reportContent').value = report.description || report.content || report.isi || '';
                
                const modalEl = document.getElementById('reportModal');
                if (modalEl) {
                    const modalInstance = bootstrap.Modal.getOrCreateInstance(modalEl);
                    modalInstance.show();
                }
            } catch (error) {
                console.error("Error editReport:", error);
                alert("Gagal memuat rincian data lama laporan.");
            }
        };

        // Menghapus data laporan dari database saat tombol Hapus diklik
        window.deleteReport = async function(id) {
            if (!confirm("Apakah kamu yakin ingin menghapus laporan ini secara permanen?")) return;

            try {
                const response = await fetch(`${API_BASE}${id}/`, {
                    method: 'DELETE',
                    headers:getAuthHeaders()
                });

                if (response.ok || response.status === 204) {
                    alert("Laporan berhasil dihapus!");
                    window.loadDashboardData(currentTab, 1);
                } else {
                    alert("Gagal menghapus laporan. Status: " + response.status);
                }
            } catch (error) {
                console.error("Error deleteReport:", error);
                alert("Koneksi bermasalah ke server.");
            }
        };

        // Jalankan pemuatan otomatis pertama kali saat halaman diakses
        document.addEventListener('DOMContentLoaded', () => {
            window.loadDashboardData('feed', 1);
        });
    </script>
</body>
</html>
