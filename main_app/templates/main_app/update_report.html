<h1>Edit Laporan</h1>

<form method="POST" onsubmit="document.getElementById('btn-update').innerText='Loading...'; document.getElementById('btn-update').disabled=true;">
    {% csrf_token %}
    {{ form.as_p }}
    
    <button type="submit" id="btn-update" class="btn btn-warning">
        Update
    </button>
</form>
